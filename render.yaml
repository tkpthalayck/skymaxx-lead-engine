services:
  - type: web
    name: skymaxx-lead-engine
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: ZEPTO_TOKEN
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: FROM_NAME
        value: "Ali | SKYMAXX IT Solutions"
      - key: DB_PATH
        value: /var/data/skymaxx.db
    disk:
      name: skymaxx-data
      mountPath: /var/data
      sizeGB: 1
