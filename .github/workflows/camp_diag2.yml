name: CampDiag2
on: { workflow_dispatch: , push: { paths: ['camp_diag.py'] } }
permissions: { contents: write }
jobs:
  v:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - run: python3 camp_diag.py
      - if: always()
        run: |
          git config user.email "b@s.c"; git config user.name "B"
          git add -f camp_diag.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "cd [skip ci]"
          git push || true
