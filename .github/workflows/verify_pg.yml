name: VerifyPG
on:
  workflow_dispatch:
  push:
    paths: ['verify_pg.py']
permissions:
  contents: write
jobs:
  v:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: python3 verify_pg.py
      - if: always()
        run: |
          git config user.email "b@s.c"
          git config user.name "B"
          git add -f verify_pg.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "verify [skip ci]"
          git push || true
