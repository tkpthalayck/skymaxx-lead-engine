name: Verify Live
on:
  push:
    paths: ['verify_live.py']
permissions:
  contents: write
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 verify_live.py
      - if: always()
        run: |
          git config user.email "bot@skymaxx.company"
          git config user.name "Bot"
          git add -f verify.txt || true
          git diff --staged --quiet || git commit -m "verify [skip ci]"
          git push || true
