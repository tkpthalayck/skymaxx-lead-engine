name: Render Status Issue
on:
  workflow_dispatch:
  push:
    paths: ['.github/workflows/issue.yml']
jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Get Render and create issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RENDER_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          echo "=== Calling Render API ==="
          RESP=$(curl -s -w "\nHTTP:%{http_code}" -H "Authorization: Bearer $RENDER_KEY" "https://api.render.com/v1/services?limit=20")
          echo "$RESP"

          BODY=$(echo "$RESP" | python3 -c "
import sys
data = sys.stdin.read()
print(data[:3000])
")

          # Create issue with the response
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues" \
            -d "{\"title\":\"Render API Status Check\",\"body\":\"\\\`\\\`\\\`\\n$(echo "$RESP" | head -c 5000 | sed 's/"/\\"/g' | sed ':a;N;\$!ba;s/\n/\\n/g')\\n\\\`\\\`\\\`\"}"
