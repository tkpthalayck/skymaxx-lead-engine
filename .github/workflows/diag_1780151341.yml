name: Simple Direct Edit Diag
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Wait for deploy
        run: sleep 100
      - name: Run tests + write output to repo
        run: |
          BASE="https://skymaxx-lead-engine.onrender.com"
          OUT="/tmp/test_output.txt"
          {
            echo "=== TEST RUN: $(date -u +%Y-%m-%d-%H-%M-%S) ==="
            
            echo ""; echo "--- 1. Login ---"
            curl -s -c /tmp/cj.txt -X POST "$BASE/login" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "password=SKYMAXX@2026" -o /dev/null -w "HTTP %{http_code}\n"
            
            echo ""; echo "--- 2. GET /api/sequence/templates ---"
            curl -s -b /tmp/cj.txt "$BASE/api/sequence/templates" > /tmp/tpl.json
            python3 << 'PYEOF'
          import json
          with open('/tmp/tpl.json') as f: d = json.load(f)
          if isinstance(d, list):
              print(f"OK: {len(d)} templates")
              for t in d:
                  edited = t.get('edited', 'MISSING_FIELD')
                  print(f"  Step {t['step']}: edited={edited} | subject={t['subject'][:65]}")
          else:
              print(f"ERROR: {d}")
          PYEOF
            
            echo ""; echo "--- 3. POST /api/sequence/save_template ---"
            curl -s -b /tmp/cj.txt -X POST "$BASE/api/sequence/save_template" \
              -H "Content-Type: application/json" \
              -d '{"step":1,"subject":"TEST EDIT","body":"<p>test {{name}}</p>"}'
            echo ""
            
            echo ""; echo "--- 4. Verify edit applied ---"
            curl -s -b /tmp/cj.txt "$BASE/api/sequence/templates" | python3 -c "
          import sys, json
          for t in json.load(sys.stdin):
              if t['step']==1: print(f\"step1: edited={t.get('edited')}, subj={t['subject']}\")"
            
            echo ""; echo "--- 5. Reset ---"
            curl -s -b /tmp/cj.txt -X POST "$BASE/api/sequence/reset_template/1"
            echo ""
            
            echo ""; echo "--- 6. Verify reset ---"
            curl -s -b /tmp/cj.txt "$BASE/api/sequence/templates" | python3 -c "
          import sys, json
          for t in json.load(sys.stdin):
              if t['step']==1: print(f\"step1 after reset: edited={t.get('edited')}, subj={t['subject'][:80]}\")"
            
            echo ""; echo "--- 7. Audit all templates for assumptions ---"
            curl -s -b /tmp/cj.txt "$BASE/api/sequence/templates" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          bad = ['their tenants','1 in 323','43% of M365','61% of SMBs were breached','your tenant']
          for t in d:
              bl = t['body'].lower(); sl = t['subject'].lower()
              found = [p for p in bad if p.lower() in bl or p.lower() in sl]
              status = '❌ '+str(found) if found else '✓ CLEAN'
              print(f\"step{t['step']}: {status}\")"
            
            echo ""; echo "=== END ==="
          } > "$OUT" 2>&1
          
          cat "$OUT"
          cp "$OUT" ./test_output.txt
      - name: Commit test output
        run: |
          git config user.email "test@example.com"
          git config user.name "Test Bot"
          git add test_output.txt
          git commit -m "test output [skip ci]" || true
          git push || true
