name: PostFix
on: { workflow_dispatch: , push: { paths: ['postfix.py'] } }
permissions: { contents: write }
jobs:
  v:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - run: python3 postfix.py
      - if: always()
        run: |
          git config user.email "b@s.c"
          git config user.name "B"
          git add -f postfix.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "postfix [skip ci]"
          git push || true
