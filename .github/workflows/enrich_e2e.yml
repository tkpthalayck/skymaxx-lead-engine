name: Enrich E2E
on: { push: { paths: ['enrich_test.py'] } }
permissions: { contents: write }
jobs:
  v:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - run: python3 enrich_test.py
      - if: always()
        run: |
          git config user.email "bot@skymaxx.company"
          git config user.name "Bot"
          git add -f enrich_test.txt || true
          git diff --staged --quiet || git commit -m "v [skip ci]"
          git push || true
