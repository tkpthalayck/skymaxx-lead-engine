name: DiagPG
on:
  workflow_dispatch:
  push: { paths: ['diag_pg.py'] }
permissions: { contents: write }
jobs:
  v:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 diag_pg.py
      - if: always()
        run: |
          git config user.email "b@s.c"
          git config user.name "B"
          git add -f diag_pg.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "diag [skip ci]"
          git push || true
