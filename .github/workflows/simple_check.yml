name: simple-check
on:
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Check Render app + deploy status
        env:
          RENDER_API_KEY: rnd_C7jBUGG8sEuBRvqf3U4w4YU4zWsx
        run: |
          {
            echo "=== Render deploy status ==="
            curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/srv-d88vm9favr4c7396kt00/deploys?limit=3" | python3 -m json.tool | head -50
            echo ""
            echo "=== App endpoints ==="
            for ep in / /api/config /api/stats /api/leads /api/campaigns; do
              CODE=$(curl -s -o /tmp/b -w "%{http_code}" --max-time 45 "https://skymaxx-lead-engine.onrender.com$ep")
              echo "$ep -> HTTP $CODE"
              if [ "$CODE" != "200" ]; then
                head -c 300 /tmp/b
                echo ""
              fi
            done
          } > simple_check.txt
          cat simple_check.txt
      - name: Commit
        if: always()
        run: |
          git config user.email "b@s.c"
          git config user.name "B"
          git add -f simple_check.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "simple [skip ci]"
          git push || true
