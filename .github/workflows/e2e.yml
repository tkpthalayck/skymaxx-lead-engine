name: E2E Test
on:
  push:
    paths: ['e2e_test.py']
permissions:
  contents: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run E2E
        run: python3 e2e_test.py
      - name: Commit
        if: always()
        run: |
          git config user.email "bot@skymaxx.company"
          git config user.name "Bot"
          git add -f e2e_test.txt || true
          git diff --staged --quiet && echo "nothing" || git commit -m "e2e test [skip ci]"
          git push || true
