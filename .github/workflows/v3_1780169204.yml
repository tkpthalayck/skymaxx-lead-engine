name: Verify v3 - URLs + Health
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - shell: bash
        run: |
          set +e
          BASE="https://skymaxx-lead-engine.onrender.com"
          {
            echo "════════════════════════════════════════"
            echo " VERIFY: Website URLs + Health Endpoint"
            echo " $(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)"
            echo "════════════════════════════════════════"
            
            # 1. /api/health WITHOUT login (must be public)
            echo ""
            echo "── 1. /api/health (no auth) ──"
            curl -s -o /tmp/h.json -w "HTTP %{http_code} in %{time_total}s\n" "$BASE/api/health"
            cat /tmp/h.json
            echo ""
            
            # 2. Verify it really doesnt require login
            echo ""
            echo "── 2. /api/health WITHOUT any cookie ──"
            curl -s -o /tmp/h2.json -w "HTTP %{http_code}\n" "$BASE/api/health"
            python3 -c "
          import json
          d = json.load(open('/tmp/h2.json'))
          print('Status:', d.get('status'))
          print('DB:', d.get('db'), '(latency:', d.get('db_latency_ms'), 'ms)')
          print('Service:', d.get('service'))
          print('Timestamp:', d.get('ts'))"
            
            # 3. Login + check templates contain website URLs
            echo ""
            echo "── 3. Login + verify URLs in templates ──"
            curl -s -c /tmp/cj -X POST "$BASE/login" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              --data-urlencode "username=admin" \
              --data-urlencode "password=SKYMAXX@2026" \
              -o /dev/null -w "Login HTTP %{http_code}\n"
            
            curl -s -b /tmp/cj "$BASE/api/sequence/templates" > /tmp/tpl.json
            python3 << 'PYEOF1'
          import json
          d = json.load(open('/tmp/tpl.json'))
          print(f"Got {len(d)} templates")
          for t in d:
              body = t['body']
              url_count = body.count('SKYMAXX.Company')
              header_check = 'href="https://www.SKYMAXX.Company"' in body
              footer_check = body.lower().count('skymaxx.company') >= 5
              print(f"  step {t['step']}: SKYMAXX.Company mentions={url_count} | header_link={header_check} | footer_link={footer_check}")
          PYEOF1
            
            # 4. Render preview and inspect HTML structure for one step
            echo ""
            echo "── 4. Preview step 1 - validate URL placement ──"
            curl -s -b /tmp/cj "$BASE/api/sequence/preview/1?name=Test" > /tmp/prev.json
            python3 << 'PYEOF2'
          import json
          d = json.load(open('/tmp/prev.json'))
          body = d.get('body', '')
          print(f"Preview subject: {d.get('subject', '')[:60]}")
          print(f"Body size: {len(body):,} bytes")
          # Find header section (logo + brand)
          header_idx = body.find('SKYMAXX <span')
          footer_idx = body.find('Microsoft 365 Management for SMBs')
          mid = (header_idx + footer_idx) // 2
          # Count URL positions
          positions = []
          start = 0
          while True:
              i = body.find('SKYMAXX.Company', start)
              if i < 0: break
              positions.append(i)
              start = i + 1
          print(f"\nSKYMAXX.Company appears at {len(positions)} positions in body")
          if positions:
              in_header = sum(1 for p in positions if p < header_idx + 500)
              in_body = sum(1 for p in positions if header_idx + 500 < p < footer_idx - 100)
              in_footer = sum(1 for p in positions if p >= footer_idx - 100)
              print(f"  Header region: {in_header} mentions")
              print(f"  Body region:   {in_body} mentions")
              print(f"  Footer region: {in_footer} mentions")
          
          # Strategic placements check
          has_top = positions and positions[0] < (header_idx + (footer_idx - header_idx) * 0.4)
          has_mid = any(header_idx + (footer_idx - header_idx) * 0.4 < p < header_idx + (footer_idx - header_idx) * 0.7 for p in positions)
          has_bot = any(header_idx + (footer_idx - header_idx) * 0.7 < p < footer_idx for p in positions)
          print(f"\n  Strategic placement check:")
          print(f"    TOP body region:    {'✓ YES' if has_top else '? check'}")
          print(f"    MIDDLE body region: {'✓ YES' if has_mid else '? check'}")
          print(f"    BOTTOM body region: {'✓ YES' if has_bot else '? check'}")
          PYEOF2
            
            # 5. Audit ALL templates for assumption phrases (regression test)
            echo ""
            echo "── 5. Audit (no infrastructure assumptions) ──"
            python3 << 'PYEOF3'
          import json
          d = json.load(open('/tmp/tpl.json'))
          bad = ['their tenants','1 in 323','43% of m365','61% of smbs were breached','your tenant']
          clean = True
          for t in d:
              c = (t['body'] + ' ' + t['subject']).lower()
              found = [p for p in bad if p in c]
              status = ('FOUND ' + str(found)) if found else 'CLEAN'
              if found: clean = False
              print(f"  step{t['step']}: {status}")
          print()
          print('OVERALL:', 'ALL CLEAN ✓' if clean else 'HAS ASSUMPTIONS ✗')
          PYEOF3
            
            echo ""
            echo "════════════════════════════════════════"
            echo "VERIFICATION COMPLETE"
            echo "════════════════════════════════════════"
          } > verify_result.txt 2>&1
          cat verify_result.txt
          exit 0
      - run: |
          git config user.email "test@bot.com"
          git config user.name "Verify Bot"
          git add verify_result.txt
          git commit -m "verify result [skip ci]"
          git push
