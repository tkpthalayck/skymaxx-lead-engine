name: Render Status Dump
on:
  push:
    paths: ['.github/workflows/status.yml']
jobs:
  status:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Dump Render services
        run: |
          curl -s \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Accept: application/json" \
            "https://api.render.com/v1/services?limit=20" > render_services.json
          cat render_services.json
          python3 -c "
import json
with open('render_services.json') as f:
    services = json.load(f)
with open('RENDER_STATUS.txt','w') as out:
    for s in services:
        srv = s.get('service', {})
        name = srv.get('name','')
        sid  = srv.get('id','')
        url  = srv.get('serviceDetails',{}).get('url','no-url')
        status = srv.get('suspended','active')
        out.write(f'{name} | {sid} | {url} | {status}
')
        print(f'{name} | {sid} | {url} | {status}')
"
      - name: Commit status file
        run: |
          git config user.email "bot@skymaxx.company"
          git config user.name "SKYMAXX Bot"
          git add RENDER_STATUS.txt render_services.json
          git diff --staged --quiet || git commit -m "Add Render status"
          git push
