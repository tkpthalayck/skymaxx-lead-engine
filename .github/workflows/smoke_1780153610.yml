name: Final Smoke Test
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - shell: bash
        run: |
          set +e
          BASE="https://skymaxx-lead-engine.onrender.com"
          {
            echo "════════════════════════════════════════════════"
            echo "SKYMAXX LEAD ENGINE — FINAL SMOKE TEST"
            echo "$(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)"
            echo "════════════════════════════════════════════════"
            
            # 1. App responsive
            echo ""
            echo "── 1. App responsive ──"
            curl -s -o /dev/null -w "GET / → HTTP %{http_code} in %{time_total}s\n" "$BASE/"
            curl -s -o /dev/null -w "GET /login → HTTP %{http_code} in %{time_total}s\n" "$BASE/login"
            
            # 2. Login
            echo ""
            echo "── 2. Login ──"
            curl -s -c /tmp/cj -X POST "$BASE/login" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              --data-urlencode "username=admin" \
              --data-urlencode "password=SKYMAXX@2026" \
              -o /dev/null -w "POST /login → HTTP %{http_code}\n"
            
            # 3. Diagnostics endpoint
            echo ""
            echo "── 3. /api/admin/diag (DB health) ──"
            curl -s -b /tmp/cj "$BASE/api/admin/diag" | python3 -m json.tool 2>&1 | head -50
            
            # 4. Sequence templates - confirm new ones live
            echo ""
            echo "── 4. /api/sequence/templates (no-assumption messaging) ──"
            curl -s -b /tmp/cj "$BASE/api/sequence/templates" > /tmp/t.json
            python3 << 'PYEOF1'
          import json
          d = json.load(open('/tmp/t.json'))
          print(f"  → {len(d)} templates")
          for t in d:
              print(f"    step {t['step']}: edited={t['edited']:5} | subject: {t['subject'][:65]}")
          PYEOF1
            
            # 5. Assumption audit
            echo ""
            echo "── 5. Assumption phrase audit ──"
            python3 << 'PYEOF2'
          import json
          d = json.load(open('/tmp/t.json'))
          bad = ['their tenants','1 in 323','43% of m365','61% of smbs were breached','your tenant']
          clean = True
          for t in d:
              c = (t['body'] + ' ' + t['subject']).lower()
              found = [p for p in bad if p in c]
              if found:
                  print(f"    step {t['step']}: FOUND {found}")
                  clean = False
              else:
                  print(f"    step {t['step']}: ✓ clean")
          print()
          print(f"  RESULT: {'✓ ALL TEMPLATES CLEAN — NO INFRASTRUCTURE ASSUMPTIONS' if clean else '✗ FAILED'}")
          PYEOF2
            
            # 6. Direct edit flow
            echo ""
            echo "── 6. Direct edit endpoint cycle ──"
            curl -s -b /tmp/cj -X POST "$BASE/api/sequence/save_template" \
              -H "Content-Type: application/json" \
              -d '{"step":2,"subject":"SMOKE TEST","body":"<p>test</p>"}' \
              -w "\n    POST save_template → HTTP %{http_code}\n"
            
            curl -s -b /tmp/cj "$BASE/api/sequence/templates" | python3 -c "
          import sys, json
          for t in json.load(sys.stdin):
              if t['step']==2: print(f'    step 2 after save: edited={t[\"edited\"]}, by={t.get(\"edited_by\")}, subj={t[\"subject\"]}')"
            
            curl -s -b /tmp/cj -X POST "$BASE/api/sequence/reset_template/2" \
              -w "\n    POST reset_template/2 → HTTP %{http_code}\n"
            
            curl -s -b /tmp/cj "$BASE/api/sequence/templates" | python3 -c "
          import sys, json
          for t in json.load(sys.stdin):
              if t['step']==2: print(f'    step 2 after reset: edited={t[\"edited\"]}, subj={t[\"subject\"][:80]}')"
            
            # 7. Campaign overview - confirm sequence engine state
            echo ""
            echo "── 7. /api/campaigns (sequence engine state) ──"
            curl -s -b /tmp/cj "$BASE/api/campaigns" | python3 << 'PYEOF3'
          import sys, json
          d = json.load(sys.stdin)
          campaigns = d if isinstance(d, list) else d.get('campaigns', [])
          print(f"  → {len(campaigns)} campaigns")
          for c in campaigns:
              progress = c.get('step_progress', [])
              prog_summary = ' '.join(f"S{p['step']}:{p['sent']}/{p['total']}" for p in progress) if progress else 'no progress data'
              print(f"    #{c['id']} '{c['name']}': {c.get('recipient_count', '?')} leads | {prog_summary}")
          PYEOF3
            
            # 8. Piggyback cron health
            echo ""
            echo "── 8. Piggyback cron last-run ──"
            curl -s -b /tmp/cj "$BASE/api/admin/diag" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          # Find piggyback info if present
          for k,v in d.items() if isinstance(d, dict) else []:
              if 'cron' in k.lower() or 'piggyback' in k.lower():
                  print(f'    {k}: {v}')" 2>&1 | head -5
            
            echo ""
            echo "════════════════════════════════════════════════"
            echo "                SMOKE TEST DONE"
            echo "════════════════════════════════════════════════"
          } > smoke_result.txt 2>&1
          cat smoke_result.txt
          exit 0
      - run: |
          git config user.email "test@bot.com"
          git config user.name "Smoke Test"
          git add smoke_result.txt
          git commit -m "smoke test result [skip ci]"
          git push
