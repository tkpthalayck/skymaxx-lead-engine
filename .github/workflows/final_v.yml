name: FinalV
on: { workflow_dispatch: , push: { paths: ['final_v.py'] } }
permissions: { contents: write }
jobs:
  v:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - run: python3 final_v.py
      - if: always()
        run: |
          git config user.email "b@s.c"
          git config user.name "B"
          git add -f final_v.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "fv [skip ci]"
          git push || true
