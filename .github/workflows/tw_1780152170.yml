name: Test With Output
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sleep 5
      - shell: bash
        run: |
          set +e
          python3 test_direct_edit.py > test_result.txt 2>&1
          EXIT=$?
          echo "" >> test_result.txt
          echo "Exit code: $EXIT" >> test_result.txt
          cat test_result.txt
          exit 0
      - run: |
          git config user.email "test@bot.com"
          git config user.name "Test Bot"
          git add test_result.txt
          git commit -m "test result [skip ci]"
          git push
