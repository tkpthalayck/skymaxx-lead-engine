name: Ping Live URL
on:
  push:
    paths: [".github/workflows/ping.yml"]
jobs:
  ping:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Check URL and save
        run: |
          URL="https://skymaxx-lead-engine.onrender.com"
          CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL" || echo "pending")
          echo "URL: $URL | HTTP: $CODE" | tee LIVE_URL.txt
          RENDER_RESP=$(curl -s -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" https://api.render.com/v1/services?limit=5)
          echo "$RENDER_RESP" | python3 -c "import sys,json; [print(s["service"]["name"],"=>",s["service"].get("serviceDetails",{}).get("url","building...")) for s in json.load(sys.stdin)]" >> LIVE_URL.txt
      - run: |
          git config user.email "bot@skymaxx.company"
          git config user.name "SKYMAXX Bot"
          git add LIVE_URL.txt
          git diff --staged --quiet || git commit -m "Save live URL"
          git push
