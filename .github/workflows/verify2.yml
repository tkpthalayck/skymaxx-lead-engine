name: Verify2
on: { workflow_dispatch: , push: { paths: ['verify2.py'] } }
permissions: { contents: write }
jobs:
  v:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4
      - run: python3 verify2.py
      - if: always()
        run: |
          git config user.email "b@s.c"
          git config user.name "B"
          git add -f verify2.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "v2 [skip ci]"
          git push || true
