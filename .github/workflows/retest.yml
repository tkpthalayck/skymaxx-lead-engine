name: Retest
on: { workflow_dispatch: , push: { paths: ['retest.py'] } }
permissions: { contents: write }
jobs:
  v:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 retest.py
      - if: always()
        run: |
          git config user.email "b@s.c"
          git config user.name "B"
          git add -f retest.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "rt [skip ci]"
          git push || true
