name: Platform Audit
on:
  push:
    paths: ['platform_audit.py']
permissions:
  contents: write
jobs:
  v:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 platform_audit.py
      - if: always()
        run: |
          git config user.email "bot@skymaxx.company"
          git config user.name "Bot"
          git add -f audit.txt || true
          git diff --staged --quiet || git commit -m "audit [skip ci]"
          git push || true
