name: Diag Direct Edit v2
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Wait
        run: sleep 80
      - name: Login
        run: |
          curl -s -c /tmp/cj.txt -X POST "https://skymaxx-lead-engine.onrender.com/login" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "password=SKYMAXX@2026" -o /dev/null -w "Login HTTP: %{http_code}\n"
      - name: Get templates
        run: |
          curl -s -b /tmp/cj.txt "https://skymaxx-lead-engine.onrender.com/api/sequence/templates" > /tmp/tpl.json
          echo "=== Templates response (first 500 chars) ==="
          head -c 500 /tmp/tpl.json
          echo ""
          echo "=== Length ==="
          wc -c /tmp/tpl.json
          echo "=== Is array? Check ==="
          python3 -c "import json; d=json.load(open('/tmp/tpl.json')); print(f'len={len(d) if isinstance(d,list) else \"NOT ARRAY: \"+str(d)[:200]}')"
      - name: Test save
        run: |
          echo "=== POST save_template ==="
          curl -s -b /tmp/cj.txt -X POST "https://skymaxx-lead-engine.onrender.com/api/sequence/save_template" \
            -H "Content-Type: application/json" \
            -d '{"step":1,"subject":"TEST","body":"<p>hi {{name}}</p>"}' \
            -w "\nHTTP %{http_code}\n"
      - name: Verify
        run: |
          curl -s -b /tmp/cj.txt "https://skymaxx-lead-engine.onrender.com/api/sequence/templates" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); [print(f\"step{t['step']}: edited={t.get('edited')}, subj={t['subject'][:70]}\") for t in d]"
      - name: Reset and verify
        run: |
          echo "=== Reset step 1 ==="
          curl -s -b /tmp/cj.txt -X POST "https://skymaxx-lead-engine.onrender.com/api/sequence/reset_template/1"
          echo ""
          echo "=== Verify reset ==="
          curl -s -b /tmp/cj.txt "https://skymaxx-lead-engine.onrender.com/api/sequence/templates" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); [print(f\"step{t['step']}: edited={t.get('edited')}, subj={t['subject'][:70]}\") for t in d]"
      - name: Audit for assumptions
        run: |
          curl -s -b /tmp/cj.txt "https://skymaxx-lead-engine.onrender.com/api/sequence/templates" | \
            python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          bad = ['their tenants','1 in 323','43% of m365','61% of smbs were breached']
          for t in d:
              b = t['body'].lower() + ' ' + t['subject'].lower()
              found = [p for p in bad if p in b]
              print(f\"step{t['step']}: {('FOUND '+str(found)) if found else 'CLEAN'}\")"
