name: CompareHtml
on: { workflow_dispatch: , push: { paths: ['compare_html.py'] } }
permissions: { contents: write }
jobs:
  v:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - run: python3 compare_html.py
      - if: always()
        run: |
          git config user.email "b@s.c"
          git config user.name "B"
          git add -f compare.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "compare [skip ci]"
          git push || true
