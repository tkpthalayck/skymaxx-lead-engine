name: DNS Check
on:
  push:
    paths: ['.github/workflows/dns_check.yml']
permissions:
  contents: write
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: DNS Lookup for skymaxx.company
        run: |
          echo '=== MX records (mail server) ===' > dns_info.txt
          dig +short MX skymaxx.company >> dns_info.txt
          echo '' >> dns_info.txt
          echo '=== TXT records (SPF/verification) ===' >> dns_info.txt
          dig +short TXT skymaxx.company >> dns_info.txt
          echo '' >> dns_info.txt
          echo '=== NS records ===' >> dns_info.txt
          dig +short NS skymaxx.company >> dns_info.txt
          echo '' >> dns_info.txt
          echo '=== Existing subdomains ===' >> dns_info.txt
          for sub in www mail leads app engine api; do
            res=$(dig +short $sub.skymaxx.company)
            [ -n "$res" ] && echo "$sub.skymaxx.company -> $res" >> dns_info.txt
          done
          cat dns_info.txt
      - name: Commit
        if: always()
        run: |
          git config user.email "bot@skymaxx.company"
          git config user.name "Bot"
          git add -f dns_info.txt || true
          git diff --staged --quiet && echo "nothing" || git commit -m "DNS info [skip ci]"
          git push || true
