name: SeqDiag
on: { workflow_dispatch: , push: { paths: ['seq_diag.py'] } }
permissions: { contents: write }
jobs:
  v:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - run: python3 seq_diag.py
        continue-on-error: true
      - run: |
          git config user.email "b@s.c"; git config user.name "B"
          git add -f seq_diag.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "sd [skip ci]"
          git push || true
