name: Test ZeptoMail
on:
  push:
    paths: ['test_zepto.py']
permissions:
  contents: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test ZeptoMail API
        env:
          ZEPTO_TOKEN: ${{ secrets.ZEPTO_TOKEN }}
        run: python3 test_zepto.py
      - name: Commit results
        if: always()
        run: |
          git config user.email "bot@skymaxx.company"
          git config user.name "Bot"
          git add -f zepto_test.txt || true
          git diff --staged --quiet && echo "no changes" || git commit -m "zepto test result [skip ci]"
          git push || true
