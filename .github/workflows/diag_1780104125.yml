name: Diag1780104125
on: { workflow_dispatch: , push: { paths: ['diag_run.py'] } }
permissions: { contents: write }
jobs:
  v:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - run: python3 diag_run.py
        continue-on-error: true
      - run: |
          git config user.email "b@s.c"; git config user.name "B"
          git add -f diag_*.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "diag [skip ci]"
          git push || true
