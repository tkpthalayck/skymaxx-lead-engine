name: E2E2
on: { push: { paths: ['e2e2.py'] } }
permissions: { contents: write }
jobs:
  v:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: python3 e2e2.py
      - if: always()
        run: |
          git config user.email "bot@skymaxx.company"
          git config user.name "Bot"
          git add -f e2e2.txt || true
          git diff --staged --quiet || git commit -m "v [skip ci]"
          git push || true
