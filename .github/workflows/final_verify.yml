name: Final Verify
on:
  push:
    paths: ['final_verify.py']
permissions:
  contents: write
jobs:
  v:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: python3 final_verify.py
      - if: always()
        run: |
          git config user.email "bot@skymaxx.company"
          git config user.name "Bot"
          git add -f final_verify.txt || true
          git diff --staged --quiet || git commit -m "v [skip ci]"
          git push || true
