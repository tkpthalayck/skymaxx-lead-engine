name: E2EAuth
on: { workflow_dispatch: , push: { paths: ['e2e_auth.py'] } }
permissions: { contents: write }
jobs:
  v:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - run: python3 e2e_auth.py
      - if: always()
        run: |
          git config user.email "b@s.c"; git config user.name "B"
          git add -f e2e_auth.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "e2e [skip ci]"
          git push || true
