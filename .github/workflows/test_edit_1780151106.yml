name: Test Direct Edit Endpoints
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deploy
        run: sleep 130
      - name: Login + Test endpoints
        run: |
          BASE="https://skymaxx-lead-engine.onrender.com"
          
          # Login
          curl -s -c /tmp/cj.txt -X POST "$BASE/login" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "password=SKYMAXX@2026" -o /dev/null -w "Login: %{http_code}\n"
          
          # GET /api/sequence/templates — should have 'edited' field on each
          echo ""
          echo "=== GET /api/sequence/templates ==="
          curl -s -b /tmp/cj.txt "$BASE/api/sequence/templates" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(f'Got {len(d)} templates')
          for t in d:
              print(f\"  Step {t['step']}: {t['name']:25} | edited={t.get('edited')} | subject={t['subject'][:60]}\")"
          
          # Try saving an edit
          echo ""
          echo "=== POST /api/sequence/save_template (step 1 test edit) ==="
          curl -s -b /tmp/cj.txt -X POST "$BASE/api/sequence/save_template" \
            -H "Content-Type: application/json" \
            -d '{"step":1,"subject":"TEST EDIT - Office 365 for {{company}}","body":"<p>This is a test edit. Hi {{name}}.</p>"}' | python3 -m json.tool
          
          # Verify the edit shows up
          echo ""
          echo "=== Verify edit applied (GET templates again) ==="
          curl -s -b /tmp/cj.txt "$BASE/api/sequence/templates" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          for t in d:
              if t['step'] == 1:
                  print(f'Step 1: edited={t.get(\"edited\")}, subject={t[\"subject\"]}')
                  print(f'  body starts: {t[\"body\"][:120]}')"
          
          # Now reset
          echo ""
          echo "=== POST /api/sequence/reset_template/1 ==="
          curl -s -b /tmp/cj.txt -X POST "$BASE/api/sequence/reset_template/1" | python3 -m json.tool
          
          # Verify reset
          echo ""
          echo "=== Verify reset (should be back to default) ==="
          curl -s -b /tmp/cj.txt "$BASE/api/sequence/templates" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          for t in d:
              if t['step'] == 1:
                  print(f'Step 1: edited={t.get(\"edited\")}, subject={t[\"subject\"][:80]}')"
          
          # Confirm new template templates show no infrastructure assumptions
          echo ""
          echo "=== Audit: any assumption phrases in current templates? ==="
          curl -s -b /tmp/cj.txt "$BASE/api/sequence/templates" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          bad_phrases = ['their tenants', '1 in 323', '43% of M365', '61% of SMBs were breached', 'your tenant']
          for t in d:
              body_lower = t['body'].lower()
              subj_lower = t['subject'].lower()
              found = [p for p in bad_phrases if p.lower() in body_lower or p.lower() in subj_lower]
              status = '❌ ' + str(found) if found else '✓ CLEAN'
              print(f\"  Step {t['step']}: {status}\")"
