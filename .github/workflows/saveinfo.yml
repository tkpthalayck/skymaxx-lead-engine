name: Save Render Info
on:
  workflow_dispatch:
jobs:
  save:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Get and save Render info
        env:
          RENDER_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          curl -s -H "Authorization: Bearer $RENDER_KEY" "https://api.render.com/v1/services?limit=10" -o raw.json
          python3 << 'EOF'
import json
with open('raw.json') as f:
    data = json.load(f)
lines = []
for item in data:
    s = item.get('service', {})
    lines.append(f"name={s.get('name')} id={s.get('id')} url={s.get('serviceDetails',{}).get('url','building')}")
with open('RENDER_INFO.txt', 'w') as f:
    f.write("\n".join(lines))
print("\n".join(lines))
EOF
      - name: Commit
        run: |
          git config user.email "bot@skymaxx.company"
          git config user.name "Bot"
          git add RENDER_INFO.txt raw.json
          git diff --staged --quiet || git commit -m "Render info"
          git push
