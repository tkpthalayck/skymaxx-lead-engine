name: Save Render Info
on:
  push:
    paths:
      - 'trigger.txt'
jobs:
  save:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Get Render services
        env:
          RENDER_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          curl -s -H "Authorization: Bearer $RENDER_KEY" "https://api.render.com/v1/services?limit=10" -o raw.json
          cat raw.json
          python3 -c "
import json
with open('raw.json') as f:
    data = json.load(f)
lines = []
for item in data:
    s = item.get('service', {})
    name = s.get('name', '?')
    sid  = s.get('id', '?')
    url  = s.get('serviceDetails', {}).get('url', 'BUILDING')
    lines.append(f'{name} => {url} ({sid})')
result = chr(10).join(lines) if lines else 'NO_SERVICES_FOUND'
print(result)
with open('RENDER_INFO.txt', 'w') as f:
    f.write(result)
"
      - name: Push result
        run: |
          git config user.email "bot@skymaxx.company"
          git config user.name "SKYMAXX Bot"
          git add RENDER_INFO.txt
          git diff --staged --quiet || git commit -m "Save render info"
          git push
