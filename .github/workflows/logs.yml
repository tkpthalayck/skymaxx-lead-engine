name: Logs
on:
  workflow_dispatch:
  push: { paths: ['logs_check.py'] }
permissions: { contents: write }
jobs:
  v:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - run: python3 logs_check.py
      - if: always()
        run: |
          git config user.email "b@s.c"
          git config user.name "B"
          git add -f logs.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "logs [skip ci]"
          git push || true
