name: SetupPostgres
on:
  workflow_dispatch:
  push:
    paths:
      - 'setup_postgres.py'
permissions:
  contents: write
jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: python3 setup_postgres.py
      - if: always()
        run: |
          git config user.email "b@s.c"
          git config user.name "B"
          git add -f setup_log.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "pg setup [skip ci]"
          git push || true
