name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy or Create Render Service
        run: |
          RENDER_API_KEY="${{ secrets.RENDER_API_KEY }}"

          echo "Getting Render owner ID..."
          OWNER_RESP=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" \
            "https://api.render.com/v1/owners?limit=1")
          OWNER_ID=$(echo "$OWNER_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['owner']['id'])" 2>/dev/null)
          echo "Owner ID: $OWNER_ID"

          echo "Checking if service exists..."
          SERVICES=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" \
            "https://api.render.com/v1/services?limit=20")
          echo "Services: $SERVICES"

          EXISTING=$(echo "$SERVICES" | python3 -c "
          import sys, json
          services = json.load(sys.stdin)
          for s in services:
            srv = s.get('service', {})
            if srv.get('name') == 'skymaxx-lead-engine':
              print(srv.get('id',''))
              break
          " 2>/dev/null)

          SERVICE_URL=""

          if [ -n "$EXISTING" ]; then
            echo "Service exists: $EXISTING"
            SERVICE_URL=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$EXISTING" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('service',{}).get('serviceDetails',{}).get('url',''))" 2>/dev/null)
            curl -s -X POST \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$EXISTING/deploys" -d '{}'
            echo "Redeployed existing service"
          else
            echo "Creating new service..."
            CREATE=$(curl -s -X POST \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              "https://api.render.com/v1/services" \
              -d "{
                \"type\": \"web_service\",
                \"name\": \"skymaxx-lead-engine\",
                \"ownerId\": \"$OWNER_ID\",
                \"repo\": \"https://github.com/tkpthalayck/skymaxx-lead-engine\",
                \"branch\": \"main\",
                \"autoDeploy\": \"yes\",
                \"serviceDetails\": {
                  \"runtime\": \"python\",
                  \"buildCommand\": \"pip install -r requirements.txt\",
                  \"startCommand\": \"gunicorn app:app --bind 0.0.0.0:\$PORT --workers 2 --timeout 120\",
                  \"plan\": \"free\",
                  \"region\": \"oregon\",
                  \"envVars\": [
                    {\"key\": \"GOOGLE_MAPS_API_KEY\", \"value\": \"${{ secrets.GOOGLE_MAPS_API_KEY }}\"},
                    {\"key\": \"ZEPTO_TOKEN\",         \"value\": \"${{ secrets.ZEPTO_TOKEN }}\"},
                    {\"key\": \"FROM_EMAIL\",          \"value\": \"support@skymaxx.company\"},
                    {\"key\": \"FROM_NAME\",           \"value\": \"Ali | SKYMAXX IT Solutions\"},
                    {\"key\": \"DB_PATH\",             \"value\": \"/var/data/skymaxx.db\"}
                  ]
                }
              }")
            echo "Create response: $CREATE"
            SERVICE_ID=$(echo "$CREATE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('service',{}).get('id',''))" 2>/dev/null)
            SERVICE_URL=$(echo "$CREATE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('service',{}).get('serviceDetails',{}).get('url',''))" 2>/dev/null)
            echo "Created service ID: $SERVICE_ID"
          fi

          echo "LIVE_URL=$SERVICE_URL" >> $GITHUB_ENV
          echo "Service URL: $SERVICE_URL"

      - name: Write live URL to repo
        run: |
          echo "https://skymaxx-lead-engine.onrender.com" > LIVE_URL.txt
          if [ -n "$LIVE_URL" ]; then
            echo "$LIVE_URL" > LIVE_URL.txt
          fi
          cat LIVE_URL.txt

      - name: Commit URL file
        run: |
          git config user.email "support@royalgroups.store"
          git config user.name "SKYMAXX Deploy Bot"
          git add LIVE_URL.txt
          git diff --staged --quiet || git commit -m "Update live URL"
          git push || true
