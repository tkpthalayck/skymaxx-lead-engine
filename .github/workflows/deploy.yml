name: Deploy to Render
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Health Check
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: python3 create_render.py
      - name: Commit results
        if: always()
        run: |
          git config user.email "bot@skymaxx.company"
          git config user.name "Bot"
          git add -f deploy_debug.txt LIVE_URL.txt || true
          git diff --staged --quiet && echo "Nothing to commit" || git commit -m "health check [skip ci]"
          git push || true
