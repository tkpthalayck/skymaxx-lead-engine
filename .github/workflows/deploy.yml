name: Deploy to Render
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: echo "RENDER_KEY_LEN=${#RENDER_API_KEY}" && echo "hello_$(date)" > deploy_debug.txt && cat deploy_debug.txt
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      - run: |
          git config user.email "bot@skymaxx.company"
          git config user.name "SKYMAXX Bot"
          git add -f deploy_debug.txt
          git commit -m "test [skip ci]"
          git push
