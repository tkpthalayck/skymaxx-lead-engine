name: Deploy to Render
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Run deploy script
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          ZEPTO_TOKEN: ${{ secrets.ZEPTO_TOKEN }}
        run: python3 deploy_render.py || true
      - name: Commit debug output
        run: |
          git config user.email "bot@skymaxx.company"
          git config user.name "SKYMAXX Bot"
          git add deploy_debug.txt LIVE_URL.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "debug: save render output [skip ci]"
          git push || true
