name: VF3
on: { workflow_dispatch: , push: { paths: ['vf3.py'] } }
permissions: { contents: write }
jobs:
  v:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - run: python3 vf3.py
        continue-on-error: true
      - run: |
          git config user.email "b@s.c"; git config user.name "B"
          git add -f vf3.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "vf3 [skip ci]"
          git push || true
