name: Update Render Env
on:
  push:
    paths: ['update_render_env.py']
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update env vars
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: python3 update_render_env.py
      - name: Commit log
        if: always()
        run: |
          git config user.email "bot@skymaxx.company"
          git config user.name "Bot"
          git add -f render_env_update.txt || true
          git diff --staged --quiet && echo "nothing" || git commit -m "render env log [skip ci]"
          git push || true
