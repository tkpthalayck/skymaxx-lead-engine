name: Live Check
on: { push: { paths: ['live_check.py'] } }
permissions: { contents: write }
jobs:
  v:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 live_check.py
      - if: always()
        run: |
          git config user.email "bot@skymaxx.company"
          git config user.name "Bot"
          git add -f live_check.txt || true
          git diff --staged --quiet || git commit -m "v [skip ci]"
          git push || true
