name: Curl Test Edit
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sleep 5
      - shell: bash
        run: |
          set +e
          BASE="https://skymaxx-lead-engine.onrender.com"
          {
            echo "=== Login ==="
            curl -s -c /tmp/cj -L -X POST "$BASE/login" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "password=SKYMAXX@2026" -o /tmp/login.html -w "HTTP %{http_code}\n"
            grep -i 'invalid\|error\|login' /tmp/login.html | head -3 || true
            
            echo ""; echo "=== Cookies set ==="
            cat /tmp/cj | grep -v '^#' | head -5
            
            echo ""; echo "=== GET /api/sequence/templates ==="
            curl -s -b /tmp/cj "$BASE/api/sequence/templates" -o /tmp/tpl.json -w "HTTP %{http_code}\n"
            python3 -c "
          import json
          with open('/tmp/tpl.json') as f: txt = f.read()
          try:
              d = json.loads(txt)
              if isinstance(d, list):
                  print(f'OK: {len(d)} templates')
                  for t in d:
                      print(f\"  step{t[\\\"step\\\"]}: edited={t.get(\\\"edited\\\")}, subj={t[\\\"subject\\\"][:65]}\")
              else:
                  print(f'NOT ARRAY: {str(d)[:300]}')
          except Exception as e:
              print(f'NOT JSON: {e}')
              print('Raw:', txt[:300])"
            
            echo ""; echo "=== POST save_template (step 1) ==="
            curl -s -b /tmp/cj -X POST "$BASE/api/sequence/save_template" \
              -H "Content-Type: application/json" \
              -d '{"step":1,"subject":"DIAG TEST EDIT","body":"<p>hi {{name}} at {{company}}</p>"}' \
              -w "\nHTTP %{http_code}\n"
            
            echo ""; echo "=== Verify edit ==="
            curl -s -b /tmp/cj "$BASE/api/sequence/templates" | python3 -c "
          import sys, json
          for t in json.load(sys.stdin):
              if t['step']==1: print(f\"step1: edited={t.get('edited')}, edited_by={t.get('edited_by')}, subj={t['subject']}\")"
            
            echo ""; echo "=== Reset step 1 ==="
            curl -s -b /tmp/cj -X POST "$BASE/api/sequence/reset_template/1" -w "\nHTTP %{http_code}\n"
            
            echo ""; echo "=== Verify reset ==="
            curl -s -b /tmp/cj "$BASE/api/sequence/templates" | python3 -c "
          import sys, json
          for t in json.load(sys.stdin):
              if t['step']==1: print(f\"step1: edited={t.get('edited')}, subj={t['subject'][:80]}\")"
            
            echo ""; echo "=== Audit ALL templates for assumption phrases ==="
            curl -s -b /tmp/cj "$BASE/api/sequence/templates" | python3 -c "
          import sys, json
          bad = ['their tenants', '1 in 323', '43% of m365', '61% of smbs were breached', 'your tenant']
          for t in json.load(sys.stdin):
              b = t['body'].lower() + ' ' + t['subject'].lower()
              found = [p for p in bad if p in b]
              status = 'FOUND ' + str(found) if found else 'CLEAN'
              print(f\"step{t['step']}: {status}\")"
          } > test_result.txt 2>&1
          cat test_result.txt
          exit 0
      - run: |
          git config user.email "test@bot.com"
          git config user.name "Test Bot"
          git add test_result.txt
          git commit -m "test [skip ci]"
          git push
