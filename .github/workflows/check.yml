name: Check Render Status
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: List Render Services
        run: |
          curl -s             -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"             -H "Accept: application/json"             "https://api.render.com/v1/services?limit=20" | python3 -c "
import sys, json
services = json.load(sys.stdin)
for s in services:
    srv = s.get("service", {})
    print("SERVICE:", srv.get("name",""), "|", srv.get("id",""), "|", srv.get("serviceDetails",{}).get("url","no-url"))
"
