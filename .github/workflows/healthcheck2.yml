name: HealthCheck2
on:
  workflow_dispatch:
  push:
    paths:
      - 'healthcheck.txt'
permissions:
  contents: write
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run health check
        run: |
          BASE=https://skymaxx-lead-engine.onrender.com
          echo "=== HEALTH CHECK ===" > result.txt
          echo "" >> result.txt
          for ep in "/" "/api/config" "/api/stats" "/api/leads" "/api/campaigns"; do
            CODE=$(curl -s -o /tmp/body -w "%{http_code}" --max-time 60 "$BASE$ep" || echo "000")
            echo "$ep -> HTTP $CODE" >> result.txt
            if [ "$CODE" != "200" ]; then
              echo "  Body excerpt:" >> result.txt
              head -c 400 /tmp/body >> result.txt
              echo "" >> result.txt
            fi
          done
          echo "" >> result.txt
          echo "=== Lead count ===" >> result.txt
          curl -s --max-time 30 "$BASE/api/leads?per_page=20" -o /tmp/leads.json
          python3 -c "
import json
try:
    d = json.load(open('/tmp/leads.json'))
    print('Total:', d.get('total', 0))
    for l in d.get('leads', [])[:5]:
        print(' -', l.get('name', '')[:30], '|', l.get('email', '')[:35])
except Exception as e:
    print('ERROR:', e)
    print('Raw response:')
    print(open('/tmp/leads.json').read()[:400])
" >> result.txt
          cat result.txt
      - name: Commit result
        if: always()
        run: |
          git config user.email "bot@skymaxx.company"
          git config user.name "Bot"
          git add -f result.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "health [skip ci]"
          git push || true
