name: Get Render URL
on:
  push:
    paths: [".github/workflows/geturl.yml"]
jobs:
  get-url:
    runs-on: ubuntu-latest
    steps:
      - name: Check Render and create gist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RENDER_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          RESP=$(curl -s -H "Authorization: Bearer $RENDER_KEY" \
            "https://api.render.com/v1/services?limit=20")
          echo "Render response: $RESP"
          
          # Create a gist with the result
          CONTENT=$(echo "$RESP" | python3 -c "
import sys, json, re
try:
    services = json.load(sys.stdin)
    result = []
    for s in services:
        srv = s.get(chr(115)+chr(101)+chr(114)+chr(118)+chr(105)+chr(99)+chr(101), {})
        name = srv.get(chr(110)+chr(97)+chr(109)+chr(101),chr(63))
        sid = srv.get(chr(105)+chr(100),chr(63))
        url = srv.get(chr(115)+chr(101)+chr(114)+chr(118)+chr(105)+chr(99)+chr(101)+chr(68)+chr(101)+chr(116)+chr(97)+chr(105)+chr(108)+chr(115),{}).get(chr(117)+chr(114)+chr(108),chr(110)+chr(111)+chr(45)+chr(117)+chr(114)+chr(108))
        result.append(f"{name}|{sid}|{url}")
    print(chr(10).join(result) if result else chr(78)+chr(79)+chr(95)+chr(83)+chr(69)+chr(82)+chr(86)+chr(73)+chr(67)+chr(69)+chr(83))
except Exception as e:
    print(f"ERROR:{e}")
")
          
          # Write to file via git
          mkdir -p /tmp/result
          echo "$CONTENT" > /tmp/render_url.txt
          cat /tmp/render_url.txt
          
          # Post as commit status
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/gists" \
            -d "{\"description\":\"SKYMAXX Render Status\",\"public\":false,\"files\":{\"render_status.txt\":{\"content\":\"$CONTENT\"}}}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('GIST:', d.get('html_url',d.get('message','error')))"
