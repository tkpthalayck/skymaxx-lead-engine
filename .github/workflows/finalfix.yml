name: FinalFix
on:
  workflow_dispatch:
  push: { paths: ['final_fix.py'] }
permissions: { contents: write }
jobs:
  v:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 final_fix.py
      - if: always()
        run: |
          git config user.email "b@s.c"
          git config user.name "B"
          git add -f final_fix.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "v [skip ci]"
          git push || true
