name: Rename Sender
on:
  push:
    paths: ['rename_sender.py']
permissions:
  contents: write
jobs:
  rename:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: python3 rename_sender.py
      - if: always()
        run: |
          git config user.email "bot@skymaxx.company"
          git config user.name "Bot"
          git add -f rename_log.txt || true
          git diff --staged --quiet || git commit -m "rename log [skip ci]"
          git push || true
