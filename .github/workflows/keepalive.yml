name: SKYMAXX Keep-Alive & Uptime Monitor
# Complete UptimeRobot replacement via GitHub Actions.
# - Pings /api/health every 5 minutes (GitHub cron is best-effort, typically 5-15 min)
# - Records every check in uptime_log.txt (committed to repo as history)
# - Fails the workflow if health check fails (visible in Actions tab)
# - Public repo = unlimited GitHub Actions minutes
on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: keepalive-runner
  cancel-in-progress: false
jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Ping /api/health with retries
        id: ping
        run: |
          URL="https://skymaxx-lead-engine.onrender.com/api/health"
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          STATUS="DOWN"
          HTTP=""
          LATENCY=""
          BODY=""
          
          for i in 1 2 3; do
            START=$(date +%s%N)
            HTTP=$(curl -s -o /tmp/r.json -w "%{http_code}" \
              --max-time 25 \
              -A "SKYMAXX-KeepAlive-GH-Actions/2.0" \
              "$URL")
            END=$(date +%s%N)
            LATENCY=$(( (END - START) / 1000000 ))
            BODY=$(cat /tmp/r.json 2>/dev/null | head -c 200)
            
            if [ "$HTTP" = "200" ] && echo "$BODY" | grep -q '"status":"ok"'; then
              STATUS="UP"
              break
            fi
            
            [ $i -lt 3 ] && sleep 10
          done
          
          # Set outputs for use in next step
          echo "ts=$TS"             >> $GITHUB_OUTPUT
          echo "status=$STATUS"     >> $GITHUB_OUTPUT
          echo "http=$HTTP"         >> $GITHUB_OUTPUT
          echo "latency=$LATENCY"   >> $GITHUB_OUTPUT
          
          # Pretty log line
          echo "════════ $TS ════════"
          echo "  Status:  $STATUS"
          echo "  HTTP:    $HTTP"
          echo "  Latency: ${LATENCY}ms"
          echo "  Body:    $BODY"
          
          if [ "$STATUS" = "DOWN" ]; then
            echo "::error::Health check FAILED — HTTP $HTTP, body: $BODY"
            exit 1
          fi
      
      - name: Append to uptime_log.txt (keep last 200 entries)
        if: always()
        run: |
          TS="${{ steps.ping.outputs.ts }}"
          STATUS="${{ steps.ping.outputs.status }}"
          HTTP="${{ steps.ping.outputs.http }}"
          LATENCY="${{ steps.ping.outputs.latency }}"
          
          if [ -z "$TS" ]; then TS=$(date -u +%Y-%m-%dT%H:%M:%SZ); fi
          if [ -z "$STATUS" ]; then STATUS="DOWN"; fi
          
          ICON="✓"
          [ "$STATUS" = "DOWN" ] && ICON="✗"
          
          LINE="$TS  $ICON $STATUS  HTTP=$HTTP  latency=${LATENCY}ms"
          
          # Pull latest first to avoid push conflicts with concurrent runs
          git config user.email "keepalive@skymaxx.company"
          git config user.name  "SKYMAXX Keep-Alive Bot"
          git pull --rebase origin main 2>/dev/null || true
          
          # Append new line, keep last 200 lines
          touch uptime_log.txt
          echo "$LINE" >> uptime_log.txt
          tail -200 uptime_log.txt > uptime_log.tmp && mv uptime_log.tmp uptime_log.txt
          
          git add uptime_log.txt
          git commit -m "uptime: $ICON $STATUS at $TS [skip ci]" || echo "nothing to commit"
          
          # Push with retry (race condition with concurrent runs)
          for i in 1 2 3; do
            git push && break
            sleep 5
            git pull --rebase origin main 2>/dev/null || true
          done
