name: EPS2
on: { workflow_dispatch: , push: { paths: ['eps2.py'] } }
permissions: { contents: write }
jobs:
  v:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 eps2.py
      - if: always()
        run: |
          git config user.email "b@s.c"
          git config user.name "B"
          git add -f eps2.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "eps2 [skip ci]"
          git push || true
