name: Verify Templates
on:
  push:
    paths: ['verify_templates.py']
permissions:
  contents: write
jobs:
  v:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 verify_templates.py
      - if: always()
        run: |
          git config user.email "bot@skymaxx.company"
          git config user.name "Bot"
          git add -f templates_verify.txt || true
          git diff --staged --quiet || git commit -m "v [skip ci]"
          git push || true
