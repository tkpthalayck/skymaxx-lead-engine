name: Phase1Audit
on: { workflow_dispatch: , push: { paths: ['phase1_audit.py'] } }
permissions: { contents: write }
jobs:
  v:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: python3 phase1_audit.py
      - if: always()
        run: |
          git config user.email "b@s.c"
          git config user.name "B"
          git add -f phase1.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "p1 [skip ci]"
          git push || true
