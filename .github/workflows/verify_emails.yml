name: VerifyEmails
on:
  workflow_dispatch:
  push: { paths: ['verify_emails.py'] }
permissions:
  contents: write
jobs:
  v:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 verify_emails.py
      - if: always()
        run: |
          git config user.email "b@s.c"
          git config user.name "B"
          git add -f verify_emails.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "v [skip ci]"
          git push || true
