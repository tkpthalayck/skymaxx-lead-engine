name: VCache
on: { workflow_dispatch: , push: { paths: ['verify_cache.py'] } }
permissions: { contents: write }
jobs:
  v:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - run: python3 verify_cache.py
      - if: always()
        run: |
          git config user.email "b@s.c"; git config user.name "B"
          git add -f verify_cache.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "vc [skip ci]"
          git push || true
